version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: foxguard-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: foxguard
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: foxguard-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: foxguard-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/foxguard
    depends_on:
      - mongodb

  bot:
    build:
      context: ./apps/bot
      dockerfile: Dockerfile
    container_name: foxguard-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/foxguard
      AI_SERVICE_URL: http://ai:8000
    depends_on:
      - mongodb
      - ai

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: foxguard-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/foxguard
    depends_on:
      - mongodb

volumes:
  mongo_data:
